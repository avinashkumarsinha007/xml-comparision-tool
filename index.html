<!DOCTYPE html>
<html>
<head>
    <title>XML BOM Comparator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Upload XML Files</h2>

    <div class="file-group">
        <label>Old BOM XML</label>
        <input type="file" id="oldBom" />
    </div>

    <div class="file-group">
        <label>Old PH XML</label>
        <input type="file" id="oldPh" />
    </div>

    <div class="file-group">
        <label>New BOM XML</label>
        <input type="file" id="newBom" />
    </div>

    <div class="file-group">
        <label>New PH XML</label>
        <input type="file" id="newPh" />
    </div>

    <button id="compareBtn">Compare</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>
<script src="parser.js"></script>
<script src="compare.js"></script>
<script src="excel.js"></script>
<script src="app.js"></script>

</body>
</html>
